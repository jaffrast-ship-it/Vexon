<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEXON Women Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@0.3.8/dist/lenis.min.js"></script>
  <script defer src="https://kit.fontawesome.com/1d5f6e6140.js" crossorigin="anonymous"></script>
  <script defer src="scripts.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">VEXON</a>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="men.html">Men</a>
        <a href="women.html" class="active">Women</a>
        <a href="kids.html">Kids</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <h1>Women Collection</h1>
      <p>Premium VEXON designs for a bold look.</p>
      <div id="categoryProductGrid" class="product-grid"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-top">
      <div class="footer-logo"><h3>VEXON</h3></div>
      <div class="footer-nav"><a href="index.html">Home</a><a href="men.html">Men</a><a href="women.html">Women</a><a href="kids.html">Kids</a><a href="contact.html">Contact</a></div>
      <div class="footer-social"><a href="#"><i class="fab fa-instagram"></i></a><a href="#"><i class="fab fa-tiktok"></i></a></div>
    </div>
    <div class="footer-bottom"><p>© 2026 VEXON Streetwear. All rights reserved.</p></div>
  </footer>

  <script>
    const category = 'women';
    const categoryTarget = document.getElementById('categoryProductGrid');
    function loadCategory() {
      const filtered = products.filter(p=>p.category===category);
      categoryTarget.innerHTML='';
      filtered.forEach(product=>{
        const card=document.createElement('article'); card.className='product-card';
        card.innerHTML=
          `<a href="product.html?id=${product.id}" class="product-media" title="${product.name}">
            <img src="${product.image}" loading="lazy" alt="${product.name}" />
            <video muted loop playsinline preload="auto"><source src="${product.video}" type="video/mp4"></video>
          </a>
          <div class="product-info">
            <h3 class="product-name">${product.name}</h3>
            <p class="product-price">${new Intl.NumberFormat('en-US').format(product.price)} IQD</p>
            <div class="product-actions">
              <button class="btn btn-primary" onclick="addToCart('${product.id}'); renderCart();">Add to Cart</button>
            </div>
          </div>`;
        card.querySelector('video').addEventListener('mouseenter', function(){ this.play(); });
        card.querySelector('video').addEventListener('mouseleave', function(){ this.pause(); this.currentTime=0; });
        categoryTarget.appendChild(card);
      });
    }
    loadCategory();
  </script>
</body>
</html>
